<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Talks Today</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background-color: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        header {
            text-align: center;
            margin-bottom: 30px;
        }
        header h1 {
            font-size: 2.5em;
            color: #0056b3;
            margin: 0;
        }
        header p {
            font-size: 1.1em;
            color: #666;
        }
        .search-container {
            text-align: center;
            margin-bottom: 30px;
        }
        #search-box {
            width: 50%;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #ddd;
            font-size: 1em;
            transition: box-shadow 0.3s ease;
        }
        #search-box:focus {
            outline: none;
            border-color: #0056b3;
            box-shadow: 0 0 5px rgba(0, 86, 179, 0.5);
        }
        .schedule {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .schedule-item {
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background-color: #fafafa;
            transition: box-shadow 0.3s ease;
        }
        .schedule-item:hover {
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .schedule-item.break {
            background-color: #e9ecef;
            text-align: center;
            font-weight: bold;
            color: #495057;
        }
        .schedule-item h2 {
            font-size: 1.5em;
            color: #0056b3;
            margin-top: 0;
        }
        .talk-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            font-size: 0.9em;
            color: #555;
            margin-bottom: 15px;
        }
        .talk-meta span {
            font-weight: bold;
        }
        .talk-categories {
            margin-bottom: 15px;
        }
        .talk-categories .category {
            display: inline-block;
            background-color: #007bff;
            color: #fff;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 0.8em;
            margin-right: 5px;
        }
        .talk-description {
            font-size: 1em;
        }
        footer {
            text-align: center;
            margin-top: 40px;
            font-size: 0.9em;
            color: #777;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Tech Talks Today</h1>
            <p>A 1-day virtual event for the tech community.</p>
        </header>

        <div class="search-container">
            <input type="text" id="search-box" placeholder="Search by category...">
        </div>

        <div id="schedule" class="schedule"></div>

        <footer>
            <p>&copy; 2026 Tech Talks Today. All rights reserved.</p>
        </footer>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const talks = [
                {
                    title: "The Future of JavaScript Frameworks",
                    speakers: ["Alex Doe"],
                    categories: ["JavaScript", "Frontend", "WebDev"],
                    description: "An in-depth look at the trends shaping the future of JavaScript frameworks, from server components to build tools."
                },
                {
                    title: "Building Scalable APIs with GraphQL",
                    speakers: ["Brenda Smith"],
                    categories: ["API", "GraphQL", "Backend"],
                    description: "Learn how to design and build scalable, efficient, and flexible APIs using GraphQL and modern best practices."
                },
                {
                    title: "AI in Modern Web Applications",
                    speakers: ["Charlie Brown", "Dana White"],
                    categories: ["AI", "Machine Learning", "WebDev"],
                    description: "A practical guide to integrating artificial intelligence and machine learning features into your web applications."
                },
                {
                    title: "Advanced CSS: Beyond the Basics",
                    speakers: ["Eva Green"],
                    categories: ["CSS", "Frontend", "Design"],
                    description: "Explore powerful CSS features like Grid, Flexbox, and Custom Properties to create complex and responsive layouts with ease."
                },
                {
                    title: "Cybersecurity Fundamentals for Developers",
                    speakers: ["Frank Castle"],
                    categories: ["Security", "Cybersecurity", "Backend"],
                    description: "An essential talk for all developers on how to write more secure code and protect applications from common vulnerabilities."
                },
                {
                    title: "The Rise of WebAssembly",
                    speakers: ["Grace Hopper", "Henry Ford"],
                    categories: ["WebAssembly", "Performance", "WebDev"],
                    description: "Discover how WebAssembly is changing the landscape of web development, enabling near-native performance in the browser."
                }
            ];

            const scheduleContainer = document.getElementById('schedule');
            const searchBox = document.getElementById('search-box');
            let scheduleItems = [];

            const generateSchedule = () => {
                const startTime = new Date();
                startTime.setHours(10, 0, 0, 0); // 10:00 AM

                let talkIndex = 0;

                for (let i = 0; i < 8; i++) { // 6 talks + 1 lunch + 1 title = 8 items
                    const item = document.createElement('div');
                    item.classList.add('schedule-item');

                    const time = new Date(startTime);

                    if (i === 3) {
                        // Lunch Break
                        item.classList.add('break');
                        const endTime = new Date(time.getTime() + 60 * 60 * 1000);
                        item.innerHTML = `<h3>${formatTime(time)} - ${formatTime(endTime)}</h3><p>Lunch Break</p>`;
                        startTime.setMinutes(startTime.getMinutes() + 60);
                    } else {
                        const talk = talks[talkIndex];
                        const endTime = new Date(time.getTime() + 60 * 60 * 1000);

                        item.innerHTML = `
                            <div class="talk-time">
                                <h3>${formatTime(time)} - ${formatTime(endTime)}</h3>
                            </div>
                            <h2>${talk.title}</h2>
                            <div class="talk-meta">
                                <p><span>Speakers:</span> ${talk.speakers.join(', ')}</p>
                            </div>
                            <div class="talk-categories">
                                ${talk.categories.map(cat => `<span class="category">${cat}</span>`).join('')}
                            </div>
                            <p class="talk-description">${talk.description}</p>
                        `;

                        item.dataset.categories = talk.categories.join(',').toLowerCase();
                        scheduleItems.push(item);
                        talkIndex++;
                        startTime.setMinutes(startTime.getMinutes() + 70); // 60 min talk + 10 min break
                    }
                    scheduleContainer.appendChild(item);
                }
            };

            const formatTime = (date) => {
                return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: true });
            };

            const filterTalks = () => {
                const query = searchBox.value.toLowerCase().trim();
                scheduleItems.forEach(item => {
                    const categories = item.dataset.categories;
                    if (categories.includes(query)) {
                        item.style.display = '';
                    } else {
                        item.style.display = 'none';
                    }
                });
            };

            searchBox.addEventListener('input', filterTalks);
            generateSchedule();
        });
    </script>
</body>
</html>
